name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: |
          pip install -e .[dev]
          pip install pytest

      - name: Import tests (CPU)
        run: |
          pytest tests/test_asr.py -v

      - name: Lint
        run: |
          ruff check src/
          black --check src/ tests/
