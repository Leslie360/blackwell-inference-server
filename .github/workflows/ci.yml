name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linters
        run: pip install black==26.5.1 ruff==0.15.22

      - name: Lint
        run: |
          ruff check src/
          black --check --target-version py310 src/ tests/

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: pip install -e .

      - name: Smoke import test
        run: python -c "import blackwell_inference; print(blackwell_inference.__version__)"
